<head>
  <meta charset="UTF-8"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0c0d10;--surface:#14151c;--border:#252535;--text:#e2e2f0;--muted:#6e6e90}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 16px 60px}
    header{text-align:center;margin-bottom:24px}
    header .badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#f97316;border:1px solid #f97316;border-radius:20px;padding:4px 14px;margin-bottom:12px}
    header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
    header h1 span{color:#f97316}
    header p{color:var(--muted);font-size:13px;margin-top:5px}
    .nav-tabs{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
    .nav-tab{font-size:12px;font-weight:600;text-decoration:none;padding:6px 18px;border-radius:20px;border:1.5px solid var(--border);color:var(--muted);transition:all .18s}
    .nav-tab:hover{border-color:#f97316;color:#f97316}
    .nav-tab.active{border-color:#f97316;background:#f9731618;color:#f97316}
    .legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:28px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--muted)}
    .legend-dot{width:10px;height:10px;border-radius:3px}
    .svg-scroll{width:100%;max-width:1200px;overflow-x:auto;border-radius:16px;border:1px solid var(--border);background:var(--surface)}
    .arch-node{cursor:default}
    .arch-node:hover .nb{filter:brightness(1.25)}
    .nb{transition:filter .15s}
  </style>
</head>
<body>
<header>
  <div class="badge">Software Architecture</div>
  <h1>Ticketix — <span>Staff Module</span></h1>
  <p>Staff-side flow: Login → Dashboard → Walk-in Booking → Payment → Print Ticket</p>
</header>
<nav class="nav-tabs">
  <a class="nav-tab" href="architecture-user.html">👤 User Module</a>
  <a class="nav-tab active" href="architecture-staff.html">🧑‍💼 Staff Module</a>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Authentication</div>
  <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Dashboard</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Walk-in Booking</div>

  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Print &amp; Confirm</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Management Tools</div>
</div>
<div class="svg-scroll">
  <svg id="arch" width="1200" height="1450" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
</div>
<script>
const CATS={

  dash:  {bg:'#1f1900',border:'#eab308',text:'#fef9c3'},
  book:  {bg:'#071528',border:'#3b82f6',text:'#dbeafe'},
  pay:   {bg:'#2d1010',border:'#ef4444',text:'#fee2e2'},
  print: {bg:'#001e25',border:'#06b6d4',text:'#cffafe'},
  manage:{bg:'#1a0830',border:'#a855f7',text:'#f3e8ff'},

const NODES=[
  // AUTH Row 1
  {id:'setpwd',  cx:175,cy:87,  w:162,h:58,icon:'🔑',label:'Set Password',      file:'set-staff-password.php',   cat:'auth'},
  {id:'login',   cx:490,cy:87,  w:148,h:58,icon:'🔐',label:'Staff Login',        file:'staff-login.php',          cat:'auth'},
  {id:'guard',   cx:845,cy:87,  w:162,h:58,icon:'🛡️',label:'Session Guard',     file:'staff/staff-guard.php',    cat:'auth'},
  // DASH Row 2
  {id:'views',   cx:175,cy:215, w:162,h:58,icon:'📋',label:'View Bookings',      file:'view-bookings.php',        cat:'dash'},
  {id:'dash',    cx:490,cy:215, w:152,h:58,icon:'📊',label:'Dashboard',           file:'staff/dashboard.php',      cat:'dash'},
  {id:'locs',    cx:845,cy:215, w:148,h:58,icon:'📍',label:'Locations',           file:'staff/locations.php',      cat:'dash'},
  // DASH Row 3
  {id:'auto',    cx:175,cy:325, w:168,h:58,icon:'⚡',label:'Auto-Approve',        file:'auto-approve-bookings.php',cat:'dash'},
  // BOOKING
  {id:'booking', cx:490,cy:435, w:165,h:58,icon:'🎬',label:'Walk-in Booking',    file:'staff/booking.php',        cat:'book'},
  {id:'seats',   cx:490,cy:545, w:162,h:58,icon:'🪑',label:'Seat Selection',      file:'staff/seats.php',          cat:'book'},
  {id:'sapi',    cx:175,cy:545, w:155,h:58,icon:'📡',label:'Live Seat API',       file:'api-booked-seats.php',     cat:'book'},
  {id:'sdisc',   cx:845,cy:545, w:165,h:58,icon:'♿',label:'Discount Check',      file:'staff/checkout.php',       cat:'book'},
  {id:'checkout',cx:490,cy:655, w:148,h:58,icon:'🛒',label:'Checkout',            file:'staff/checkout.php',       cat:'book'},
  {id:'process', cx:490,cy:763, w:168,h:58,icon:'⚙️',label:'Process Booking',   file:'staff/process-booking.php',cat:'book'},
  // PAYMENT
  {id:'payment', cx:490,cy:873, w:155,h:58,icon:'💵',label:'Payment Page',        file:'staff/payment.php',        cat:'pay'},
  {id:'confirm', cx:490,cy:978, w:178,h:58,icon:'✅',label:'Booking Confirmation',file:'staff/booking-confirmation.php',cat:'pay'},
  {id:'emailr',  cx:175,cy:978, w:155,h:58,icon:'📧',label:'Receipt Email',       file:'send-booking-email.php',   cat:'pay'},
  // PRINT
  {id:'receipt', cx:175,cy:1088,w:145,h:58,icon:'🧾',label:'Receipt',             file:'staff/receipt.php',        cat:'print'},
  {id:'print',   cx:490,cy:1088,w:148,h:58,icon:'🖨️',label:'Print Ticket',       file:'staff/print-ticket.php',   cat:'print'},
  {id:'pdf',     cx:845,cy:1088,w:148,h:58,icon:'📄',label:'PDF Ticket',          file:'generate-booking-pdf.php', cat:'print'},
  // MANAGE
  {id:'mmovies', cx:175,cy:1215,w:158,h:58,icon:'🎬',label:'Movie Manager',       file:'add-show.php',             cat:'manage'},
  {id:'mdeleted',cx:175,cy:1318,w:162,h:58,icon:'🗑️',label:'Deleted Movies',    file:'view-deleted-movies.php',  cat:'manage'},
  {id:'mpwd',    cx:490,cy:1215,w:168,h:58,icon:'♿',label:'PWD Applications',    file:'admin-pwd-applications.php',cat:'manage'},
  {id:'msenior', cx:490,cy:1318,w:185,h:58,icon:'👴',label:'Senior Applications', file:'admin-senior-applications.php',cat:'manage'},
  {id:'madmin',  cx:845,cy:1215,w:148,h:58,icon:'🔧',label:'Admin Panel',         file:'admin-panel.php',          cat:'manage'},
  {id:'mremind', cx:845,cy:1318,w:168,h:58,icon:'🔔',label:'Reminder Emails',     file:'send-reminder-emails.php', cat:'manage'},
];
const CONNS=[
  // AUTH
  {f:'setpwd', t:'login',   fe:'right', te:'left',  label:'Set Password'},
  {f:'login',  t:'guard',   fe:'right', te:'left',  label:'Session Check'},
  {f:'login',  t:'dash',    fe:'bottom',te:'top',   label:'Authenticated'},
  // DASH
  {f:'guard',  t:'locs',    fe:'bottom',te:'top',   label:''},
  {f:'dash',   t:'views',   fe:'left',  te:'right', label:'Reports'},
  {f:'dash',   t:'locs',    fe:'right', te:'left',  label:'Branch'},
  {f:'dash',   t:'auto',    fe:'left',  te:'top',   label:'Auto-Approve'},
  {f:'dash',   t:'booking', fe:'bottom',te:'top',   label:'Walk-in'},
  // BOOKING
  {f:'booking',t:'seats',   fe:'bottom',te:'top',   label:''},
  {f:'seats',  t:'sapi',    fe:'left',  te:'right', label:'Real-time'},
  {f:'seats',  t:'sdisc',   fe:'right', te:'left',  label:'Discount'},
  {f:'seats',  t:'checkout',fe:'bottom',te:'top',   label:''},
  {f:'checkout',t:'process',fe:'bottom',te:'top',   label:''},
  // PAYMENT
  {f:'process',t:'payment', fe:'bottom',te:'top',   label:''},
  {f:'payment',t:'confirm', fe:'bottom',te:'top',   label:''},
  {f:'confirm',t:'emailr',  fe:'left',  te:'right', label:'Email Receipt'},
  // PRINT
  {f:'confirm',t:'print',   fe:'bottom',te:'top',   label:''},
  {f:'print',  t:'receipt', fe:'left',  te:'right', label:'Print'},
  {f:'print',  t:'pdf',     fe:'right', te:'left',  label:'PDF'},
  // MANAGE internal
  {f:'mmovies',t:'mdeleted',fe:'bottom',te:'top',   label:''},
  {f:'mpwd',   t:'msenior', fe:'bottom',te:'top',   label:''},
  {f:'madmin', t:'mremind', fe:'bottom',te:'top',   label:''},
  // MANAGE from dash (dashed-style)
  {f:'dash',   t:'mpwd',    fe:'bottom',te:'top',   label:'Manage',dashed:true},
];
const SECTIONS=[
  {label:'AUTHENTICATION',cat:'auth',  y:50, h:100},
  {label:'DASHBOARD',     cat:'dash',  y:168,h:220},
  {label:'WALK-IN BOOKING',cat:'book', y:405,h:413},
  {label:'PAYMENT',       cat:'pay',   y:835,h:200},
  {label:'PRINT & CONFIRM',cat:'print',y:1052,h:100},
  {label:'MANAGEMENT TOOLS',cat:'manage',y:1178,h:200},
];
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs={},parent){
  const e=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  if(parent)parent.appendChild(e);
  return e;
}
function gn(id){return NODES.find(n=>n.id===id)}
function ep(n,edge){
  switch(edge){
    case'top':   return[n.cx,n.cy-n.h/2];
    case'bottom':return[n.cx,n.cy+n.h/2];
    case'left':  return[n.cx-n.w/2,n.cy];
    case'right': return[n.cx+n.w/2,n.cy];
  }
}
function bp(from,to,fe,te){
  const fp=ep(from,fe),tp=ep(to,te);
  const dist=Math.hypot(tp[0]-fp[0],tp[1]-fp[1]);
  const t=Math.min(dist*.45,90);
  const dir={top:[0,-1],bottom:[0,1],left:[-1,0],right:[1,0]};
  const fd=dir[fe],td=dir[te];
  const c1=[fp[0]+fd[0]*t,fp[1]+fd[1]*t];
  const c2=[tp[0]+td[0]*t,tp[1]+td[1]*t];
  const d=`M${fp[0]},${fp[1]} C${c1[0]},${c1[1]} ${c2[0]},${c2[1]} ${tp[0]},${tp[1]}`;
  const mx=.125*fp[0]+.375*c1[0]+.375*c2[0]+.125*tp[0];
  const my=.125*fp[1]+.375*c1[1]+.375*c2[1]+.125*tp[1];
  return{d,mid:[mx,my]};
}
function render(){
  const svg=document.getElementById('arch');
  const defs=svg.querySelector('defs');
  // shadow filter
  const flt=el('filter',{id:'ns',x:'-20%',y:'-20%',width:'140%',height:'140%'},defs);
  el('feDropShadow',{dx:'0',dy:'3',stdDeviation:'5','flood-color':'#000','flood-opacity':'0.4'},flt);
  // arrows
  Object.entries(CATS).forEach(([cat,c])=>{
    const m=el('marker',{id:`arr-${cat}`,markerWidth:'8',markerHeight:'6',refX:'7',refY:'3',orient:'auto'},defs);
    el('polygon',{points:'0 0, 8 3, 0 6',fill:c.border},m);
  });
  // sections
  const sg=el('g',{},svg);
  SECTIONS.forEach(s=>{
    const c=CATS[s.cat];
    el('rect',{x:34,y:s.y,width:1132,height:s.h,rx:14,fill:c.border+'12',stroke:c.border+'45','stroke-width':'1'},sg);
    const t=el('text',{transform:`translate(20,${s.y+s.h/2}) rotate(-90)`,'text-anchor':'middle','font-size':'9','font-weight':'700','letter-spacing':'1.8',fill:c.border,opacity:'0.85'},sg);
    t.textContent=s.label;
  });
  // connections
  const cg=el('g',{},svg);
  const lg=el('g',{},svg);
  CONNS.forEach(conn=>{
    const fn=gn(conn.f),tn=gn(conn.t);
    if(!fn||!tn)return;
    const c=CATS[fn.cat];
    const{d,mid}=bp(fn,tn,conn.fe,conn.te);
    const pathAttrs={d,fill:'none',stroke:c.border,'stroke-width':'1.8',opacity:'0.75','marker-end':`url(#arr-${fn.cat})`};
    if(conn.dashed)pathAttrs['stroke-dasharray']='6 4';
    el('path',pathAttrs,cg);
    if(conn.label){
      const t=el('text',{x:mid[0],y:mid[1],'text-anchor':'middle','dominant-baseline':'middle','font-size':'9.5','font-weight':'600',fill:c.border,stroke:'#0c0d10','stroke-width':'5','paint-order':'stroke','font-family':'Inter,sans-serif'},lg);
      t.textContent=conn.label;
    }
  });
  // nodes
  const ng=el('g',{},svg);
  NODES.forEach(n=>{
    const c=CATS[n.cat];
    const hw=n.w/2,hh=n.h/2;
    const g=el('g',{class:'arch-node',transform:`translate(${n.cx},${n.cy})`},ng);
    el('rect',{class:'nb',x:-hw,y:-hh,width:n.w,height:n.h,rx:10,fill:c.bg,stroke:c.border,'stroke-width':'1.5',filter:'url(#ns)'},g);
    const lbl=el('text',{x:0,y:-7,'text-anchor':'middle','dominant-baseline':'middle','font-size':'12','font-weight':'600',fill:c.text,'font-family':'Inter,sans-serif'},g);
    lbl.textContent=`${n.icon} ${n.label}`;
    const fi=el('text',{x:0,y:11,'text-anchor':'middle','dominant-baseline':'middle','font-size':'9.5',fill:c.text,opacity:'0.6','font-family':'"Courier New",monospace'},g);
    fi.textContent=n.file;
    const tt=document.createElementNS(NS,'title');
    tt.textContent=n.file;
    g.appendChild(tt);
  });
}
render();
</script>
</body>
</html>
